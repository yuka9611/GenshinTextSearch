name: Encoding Check

on:
  push:
  pull_request:

jobs:
  utf8-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check UTF-8
        run: python tools/check_encoding.py --no-mojibake-check

